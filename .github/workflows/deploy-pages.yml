name: Deploy web app to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        # Project Pages sites are served from /<repo-name>/, so the base href
        # must match the repository name.
        run: |
          npm run prebuild
          npx ng build --configuration productionWeb --base-href=/productivitymaxx/

      - name: Add SPA fallback for Pages
        # GitHub Pages has no rewrite rules; serving index.html as 404.html
        # lets Angular's router handle deep links.
        run: cp dist/browser/index.html dist/browser/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
